<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Interview Schedule | HireReady</title>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {},
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          fontFamily: {
            headline: ["Public Sans"],
            body: ["Public Sans"],
            label: ["Public Sans"]
          }
        }
      }
    };
  </script>
  <style>
    body { font-family: 'Public Sans', sans-serif; }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
  </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 antialiased">
  <header class="bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-6 h-16 sticky top-0 z-50">
    <div class="flex items-center gap-8">
      <span class="text-xl font-bold text-blue-600 dark:text-blue-400 tracking-tight">HireReady</span>
      <nav class="hidden md:flex gap-6">
        <a class="text-slate-600 dark:text-slate-400 hover:text-blue-500 text-sm font-medium" href="dashboard.html">Dashboard</a>
        <a class="text-slate-600 dark:text-slate-400 hover:text-blue-500 text-sm font-medium" href="my-applications.html">Placements</a>
        <a class="text-blue-600 dark:text-blue-400 border-b-2 border-blue-600 dark:border-blue-400 pb-1 text-sm font-medium" href="jobs.html">Resources</a>
        <a class="text-slate-600 dark:text-slate-400 hover:text-blue-500 text-sm font-medium" href="profile.html">Network</a>
      </nav>
    </div>
    <div class="flex items-center gap-4">
      <button class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full">
        <span class="material-symbols-outlined">notifications</span>
      </button>
      <div class="w-8 h-8 rounded-full bg-slate-200 dark:bg-slate-700"></div>
    </div>
  </header>

  <div class="flex">
    <aside class="fixed left-0 top-16 h-[calc(100vh-64px)] w-64 flex flex-col p-4 z-40 bg-slate-50 dark:bg-slate-950 border-r border-slate-200 dark:border-slate-800">
      <div class="mb-8 px-4 py-2">
        <p class="text-xs font-semibold uppercase tracking-wider text-slate-400 mb-4">Student Hub</p>
        <div class="space-y-1">
          <a class="flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg" href="profile.html">
            <span class="material-symbols-outlined">person</span>
            <span class="font-sans text-sm">My Profile</span>
          </a>
          <a class="flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg" href="my-applications.html">
            <span class="material-symbols-outlined">description</span>
            <span class="font-sans text-sm">Applications</span>
          </a>
          <a class="flex items-center gap-3 text-slate-600 dark:text-slate-400 px-4 py-3 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-lg" href="jobs.html">
            <span class="material-symbols-outlined">work</span>
            <span class="font-sans text-sm">Job Board</span>
          </a>
          <a class="flex items-center gap-3 bg-blue-50 dark:bg-blue-900/30 text-blue-700 dark:text-blue-300 font-semibold px-4 py-3 rounded-lg" href="interviews.html">
            <span class="material-symbols-outlined">event_available</span>
            <span class="font-sans text-sm">Interviews</span>
          </a>
        </div>
      </div>
      <div class="mt-auto p-4 bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800">
        <a class="w-full flex items-center justify-center gap-2 text-slate-600 dark:text-slate-300 py-2 px-4 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-800" href="../login.html">
          <span class="material-symbols-outlined">logout</span>
          Sign Out
        </a>
      </div>
    </aside>

    <main class="ml-64 flex-1 p-8">
      <div class="max-w-6xl mx-auto space-y-8">
        <div>
          <h1 class="text-3xl font-extrabold text-slate-900 dark:text-white tracking-tight">Interview Schedule</h1>
          <p class="text-slate-600 dark:text-slate-400 mt-1">Create and manage your upcoming interview plan in one place.</p>
        </div>

        <section class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6">
          <h2 class="text-lg font-bold mb-4">Add Interview</h2>
          <form class="grid grid-cols-1 md:grid-cols-2 gap-4" id="interview-form">
            <label class="sr-only" for="company">Company</label>
            <input class="rounded-lg border-slate-200 dark:border-slate-700" id="company" placeholder="Company (e.g., Infosys)" required type="text"/>
            <label class="sr-only" for="role">Role</label>
            <input class="rounded-lg border-slate-200 dark:border-slate-700" id="role" placeholder="Role (e.g., Systems Engineer)" required type="text"/>
            <label class="sr-only" for="interview_type">Interview Type</label>
            <select class="rounded-lg border-slate-200 dark:border-slate-700" id="interview_type" title="Interview Type">
              <option value="Technical">Technical</option>
              <option value="HR">HR</option>
              <option value="Managerial">Managerial</option>
              <option value="Aptitude">Aptitude</option>
            </select>
            <label class="sr-only" for="mode">Interview Mode</label>
            <select class="rounded-lg border-slate-200 dark:border-slate-700" id="mode" title="Interview Mode">
              <option value="Virtual">Virtual</option>
              <option value="Onsite">Onsite</option>
              <option value="Phone">Phone</option>
            </select>
            <label class="sr-only" for="scheduled_at">Interview Date and Time</label>
            <input class="rounded-lg border-slate-200 dark:border-slate-700" id="scheduled_at" placeholder="Interview Date and Time" required title="Interview Date and Time" type="datetime-local"/>
            <label class="sr-only" for="location">Location</label>
            <input class="rounded-lg border-slate-200 dark:border-slate-700" id="location" placeholder="Location / Meeting Link" type="text"/>
            <label class="sr-only" for="status">Interview Status</label>
            <select class="rounded-lg border-slate-200 dark:border-slate-700" id="status" title="Interview Status">
              <option value="Scheduled">Scheduled</option>
              <option value="Completed">Completed</option>
              <option value="Cancelled">Cancelled</option>
            </select>
            <label class="sr-only" for="notes">Notes</label>
            <input class="rounded-lg border-slate-200 dark:border-slate-700" id="notes" placeholder="Notes (optional)" type="text"/>
            <button class="md:col-span-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg px-4 py-2 font-semibold" type="submit">Save Interview</button>
          </form>
          <p class="text-sm mt-3 text-slate-500" id="interview-form-message"></p>
        </section>

        <section class="bg-white dark:bg-slate-900 rounded-xl border border-slate-200 dark:border-slate-800 p-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-bold">Upcoming & Past Interviews</h2>
            <button class="text-sm px-3 py-1.5 rounded-lg border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800" id="refresh-interviews" type="button">Refresh</button>
          </div>
          <div class="space-y-3" id="interview-list"></div>
          <p class="text-sm mt-3 text-slate-500" id="interview-list-message"></p>
        </section>
      </div>
    </main>
  </div>

  <script src="../../js/api.js"></script>
  <script>
    function formatDateTime(value) {
      if (!value) return "Time not set";
      const dt = new Date(value);
      if (Number.isNaN(dt.getTime())) return "Time not set";
      return dt.toLocaleString("en-IN", {
        day: "2-digit",
        month: "short",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit",
      });
    }

    function setFormMessage(message, isError) {
      const el = document.getElementById("interview-form-message");
      el.textContent = message || "";
      el.className = `text-sm mt-3 ${isError ? "text-red-600" : "text-slate-500"}`;
    }

    function setListMessage(message, isError) {
      const el = document.getElementById("interview-list-message");
      el.textContent = message || "";
      el.className = `text-sm mt-3 ${isError ? "text-red-600" : "text-slate-500"}`;
    }

    function getCurrentUser() {
      return JSON.parse(localStorage.getItem("hireready_user") || "null");
    }

    async function renderInterviews() {
      const user = getCurrentUser();
      const list = document.getElementById("interview-list");
      list.innerHTML = "";

      if (!user || !user.id) {
        setListMessage("Please login first to manage interview schedules.", true);
        return;
      }

      try {
        const interviews = await window.HireReadyAPI.listInterviews(user.id);
        if (!interviews.length) {
          setListMessage("No interviews scheduled yet.", false);
          return;
        }

        setListMessage(`Showing ${interviews.length} scheduled interview(s).`, false);

        interviews.forEach((item) => {
          const card = document.createElement("article");
          card.className = "rounded-lg border border-slate-200 dark:border-slate-700 p-4";
          card.innerHTML = `
            <div class="flex items-start justify-between gap-3">
              <div>
                <h3 class="font-bold text-slate-900 dark:text-slate-100">${item.company} - ${item.role}</h3>
                <p class="text-sm text-slate-600 dark:text-slate-400 mt-1">${item.interview_type} | ${item.mode}</p>
                <p class="text-sm text-slate-600 dark:text-slate-400">${formatDateTime(item.scheduled_at)}</p>
                <p class="text-sm text-slate-500 dark:text-slate-400">${item.location || "Location not added"}</p>
                <p class="text-xs text-slate-500 mt-2">Status: <span class="font-semibold">${item.status}</span></p>
                ${item.notes ? `<p class="text-xs text-slate-500">Notes: ${item.notes}</p>` : ""}
              </div>
              <div class="flex flex-col gap-2">
                <select class="status-select rounded-md text-sm border-slate-200 dark:border-slate-700" data-id="${item.id}">
                  <option value="Scheduled" ${item.status === "Scheduled" ? "selected" : ""}>Scheduled</option>
                  <option value="Completed" ${item.status === "Completed" ? "selected" : ""}>Completed</option>
                  <option value="Cancelled" ${item.status === "Cancelled" ? "selected" : ""}>Cancelled</option>
                </select>
                <button class="delete-btn rounded-md px-3 py-1.5 text-sm bg-red-50 text-red-700 hover:bg-red-100" data-id="${item.id}" type="button">Delete</button>
              </div>
            </div>
          `;
          list.appendChild(card);
        });

        list.querySelectorAll(".status-select").forEach((el) => {
          el.addEventListener("change", async (event) => {
            const id = Number(event.target.getAttribute("data-id"));
            const status = event.target.value;
            try {
              await window.HireReadyAPI.updateInterview(id, { status });
              setListMessage("Interview status updated.", false);
            } catch (error) {
              setListMessage(error.message || "Failed to update interview status.", true);
            }
          });
        });

        list.querySelectorAll(".delete-btn").forEach((el) => {
          el.addEventListener("click", async (event) => {
            const id = Number(event.target.getAttribute("data-id"));
            try {
              await window.HireReadyAPI.deleteInterview(id);
              await renderInterviews();
            } catch (error) {
              setListMessage(error.message || "Failed to delete interview.", true);
            }
          });
        });
      } catch (error) {
        setListMessage(error.message || "Failed to load interviews.", true);
      }
    }

    document.getElementById("interview-form").addEventListener("submit", async (event) => {
      event.preventDefault();
      const user = getCurrentUser();

      if (!user || !user.id) {
        setFormMessage("Please login first to create interview schedules.", true);
        return;
      }

      const payload = {
        user_id: user.id,
        company: document.getElementById("company").value,
        role: document.getElementById("role").value,
        interview_type: document.getElementById("interview_type").value,
        mode: document.getElementById("mode").value,
        scheduled_at: new Date(document.getElementById("scheduled_at").value).toISOString(),
        location: document.getElementById("location").value,
        status: document.getElementById("status").value,
        notes: document.getElementById("notes").value,
      };

      try {
        await window.HireReadyAPI.createInterview(payload);
        event.target.reset();
        setFormMessage("Interview schedule created.", false);
        await renderInterviews();
      } catch (error) {
        setFormMessage(error.message || "Failed to create interview schedule.", true);
      }
    });

    document.getElementById("refresh-interviews").addEventListener("click", () => {
      renderInterviews();
    });

    renderInterviews();
  </script>
</body>
</html>
