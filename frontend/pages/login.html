<!DOCTYPE html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | HireReady</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .material-symbols-outlined {
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 24;
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.8);
        -webkit-backdrop-filter: blur(20px);
        backdrop-filter: blur(20px);
      }
      .primary-gradient {
        background: linear-gradient(135deg, #004ac6 0%, #2563eb 100%);
      }
      .ambient-shadow {
        box-shadow: 0 12px 32px rgba(20, 27, 43, 0.06);
      }
    </style>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#4edea3",
              "inverse-on-surface": "#edf0ff",
              "on-tertiary-container": "#ffeedd",
              secondary: "#006c49",
              "tertiary-fixed": "#ffddb8",
              "on-error-container": "#93000a",
              "error-container": "#ffdad6",
              background: "#f9f9ff",
              "tertiary-fixed-dim": "#ffb95f",
              "inverse-primary": "#b4c5ff",
              "surface-container-lowest": "#ffffff",
              "secondary-fixed": "#6ffbbe",
              "surface-container-low": "#f1f3ff",
              "surface-container": "#e9edff",
              "inverse-surface": "#293040",
              "on-surface": "#141b2b",
              "on-tertiary-fixed-variant": "#653e00",
              "on-secondary-fixed": "#002113",
              "on-primary-fixed-variant": "#003ea8",
              "outline-variant": "#c3c6d7",
              "on-tertiary": "#ffffff",
              "surface-container-highest": "#dce2f7",
              "on-tertiary-fixed": "#2a1700",
              error: "#ba1a1a",
              tertiary: "#784b00",
              "primary-fixed-dim": "#b4c5ff",
              "surface-variant": "#dce2f7",
              "surface-tint": "#0053db",
              "on-primary-container": "#eeefff",
              surface: "#f9f9ff",
              "primary-container": "#2563eb",
              outline: "#737686",
              "on-surface-variant": "#434655",
              "surface-container-high": "#e1e8fd",
              "surface-bright": "#f9f9ff",
              "surface-dim": "#d3daef",
              "on-secondary": "#ffffff",
              "on-background": "#141b2b",
              "on-primary-fixed": "#00174b",
              primary: "#004ac6",
              "tertiary-container": "#996100",
              "on-secondary-container": "#00714d",
              "on-primary": "#ffffff",
              "secondary-container": "#6cf8bb",
              "on-error": "#ffffff",
              "primary-fixed": "#dbe1ff",
              "on-secondary-fixed-variant": "#005236",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-surface min-h-screen flex flex-col">
    <header class="bg-slate-50 flex justify-between items-center w-full px-6 py-4 max-w-full mx-auto fixed top-0 z-50">
      <a class="text-xl font-bold tracking-tighter text-blue-700" href="../index.html">HireReady</a>
      <div class="flex items-center gap-4">
        <span class="text-slate-600 font-sans text-sm font-medium tracking-tight">Need help?</span>
        <span class="material-symbols-outlined text-slate-500 cursor-pointer">help</span>
      </div>
    </header>

    <main class="flex-grow flex items-center justify-center px-4 pt-24 pb-12">
      <div class="w-full max-w-[480px] surface-container-lowest glass-card rounded-xl ambient-shadow p-8 flex flex-col gap-8">
        <div class="space-y-2">
          <h1 class="text-on-surface text-3xl font-bold tracking-tight">Welcome back</h1>
          <p class="text-on-surface-variant text-base">Log in to continue your placement preparation journey.</p>
        </div>

        <form class="space-y-5" id="login-form">
          <div class="space-y-1.5">
            <label class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider" for="identifier">Email or Roll Number</label>
            <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" id="identifier" placeholder="john@university.edu or BCA/XXXXX/XX" required type="text" />
          </div>

          <div class="space-y-1.5">
            <label class="text-on-surface-variant text-xs font-semibold uppercase tracking-wider" for="login-password">Password</label>
            <input class="w-full px-4 py-3 bg-surface-container-low border-none rounded-lg text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all" id="login-password" placeholder="••••••••" required type="password" />
          </div>

          <button class="w-full primary-gradient text-on-primary font-bold py-4 rounded-lg shadow-lg active:scale-95 transition-transform hover:opacity-90" type="submit">
            Login
          </button>
          <p class="text-sm text-center" id="login-message"></p>
        </form>

        <div class="text-center">
          <p class="text-on-surface-variant text-sm">
            New here?
            <a class="text-primary font-bold hover:underline" href="register.html">Create account</a>
          </p>
        </div>
      </div>
    </main>

    <footer class="bg-slate-50 full-width py-12 px-8 border-t border-slate-200">
      <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-7xl mx-auto">
        <div class="space-y-4">
          <div class="text-lg font-bold text-slate-900">HireReady</div>
          <p class="text-slate-500 text-xs font-medium uppercase tracking-widest leading-loose">
            Elevating campus placements through strategic preparation and tracking.
          </p>
        </div>
        <div class="flex flex-wrap gap-6 items-center justify-center md:justify-start">
          <a class="text-xs font-medium uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-all" href="../index.html">Privacy Policy</a>
          <a class="text-xs font-medium uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-all" href="../index.html">Terms of Service</a>
          <a class="text-xs font-medium uppercase tracking-widest text-slate-500 hover:text-slate-800 transition-all" href="../index.html">Support</a>
        </div>
        <div class="text-right flex flex-col justify-center">
          <p class="text-xs font-medium uppercase tracking-widest text-slate-500">© 2026 HireReady. All rights reserved.</p>
        </div>
      </div>
    </footer>

    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
